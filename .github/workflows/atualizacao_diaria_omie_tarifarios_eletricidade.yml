# Fase 1: atualizar_mibel_ano_atual_ACUM.py
#   → data/omie/MIBEL_ano_atual_ACUM.csv (preços OMIE horários PT/ES, ~12 meses)
# Fase 2A (eletricidade): atualizar_tarifarios_eletricidade.py
#   → escreve OMIE+futuros OMIP no xlsx do simulador
#   → exporta as abas como CSVs individuais + manifest.json
# Fase 2B (site): corre DEPOIS da 2A porque precos-horarios lê o xlsx fresco
#   → atualizar_omie_dados_atuais.py  → data/omie/omie_dados_atuais.csv
#   → atualizar_precos-horarios_csv.py → data/omie/precos-horarios.csv
#   → gerar_records_omie.py                 → data/omie/records_omie.json (incremental)
# Deploy: xlsx + CSVs do simulador para o espaço Hugging Face (transição;
#   o nome do xlsx no HF mantém o emoji por compatibilidade).
#
# O xlsx atualizado NÃO é committed (binário sem delta inflaria o histórico).
# No git, o xlsx é a base de tarifários mantida manualmente.

name: Atualização Diária OMIE + Tarifários Eletricidade

on:
  schedule:
    # === GRUPO 1: Manhã (Todos os dias) ===
    # Horário VERÃO (WEST=UTC+1) -> 11:55, 12:10 (Local)
    - cron: '55 10 * * *'
    - cron: '10 11 * * *'
    # Horário INVERNO (WET=UTC+0) -> 11:55, 12:10 (Local)
    #- cron: '55 11 * * *'
    #- cron: '10 12 * * *'

    # === GRUPO 2: Tarde (Seg-Sex) ===
    # Horário VERÃO (WEST=UTC+1) -> 18:15, 19:00 (Local)
    - cron: '15 17 * * 1-5'
    - cron: '00 18 * * 1-5'
    # Horário INVERNO (WET=UTC+0) -> 18:15, 19:00 (Local)
    #- cron: '15 18 * * 1-5'
    #- cron: '00 19 * * 1-5'

  workflow_dispatch: # Permite execução manual

# Antecipar o default de 2026-06-16 (e silenciar o aviso de deprecação Node 20)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Serializa os workflows que fazem commit/push a este repo — impede que duas
# execuções simultâneas (do mesmo workflow ou de workflows diferentes) gerem
# pushes non-fast-forward. A execução em curso nunca é cancelada; em fila
# fica apenas a execução mais recente.
concurrency:
  group: commits-dados-energia
  cancel-in-progress: false

jobs:
  run-python-job:
    name: Executar Atualização Diária OMIE
    runs-on: ubuntu-latest
    permissions:
      contents: write # Necessário para fazer commit das alterações

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v6

      - name: Configurar Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache das dependências Python
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # =========================================================
      # FASE 1 — MIBEL (intermédio partilhado em data/omie/)
      # =========================================================
      - name: Executar Fase 1 (atualizar_mibel_ano_atual_ACUM.py)
        run: |
          mkdir -p logs
          echo "=== FASE 1 (MIBEL CSV) INICIADA: $(date) ===" >> logs/diaria_omie.log
          python scripts/atualizar_mibel_ano_atual_ACUM.py >> logs/diaria_omie.log 2>&1
          echo "=== FASE 1 (MIBEL CSV) TERMINADA: $(date) ===" >> logs/diaria_omie.log

      - name: Fazer commit do MIBEL_ano_atual_ACUM.csv
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "BOT: Atualização (Fase 1) MIBEL_ano_atual_ACUM.csv"
          file_pattern: "data/omie/MIBEL_ano_atual_ACUM.csv"

      # =========================================================
      # FASE 2A — Excel do simulador de eletricidade + CSVs das abas
      # =========================================================
      - name: Executar Fase 2A (atualizar_tarifarios_eletricidade.py)
        run: |
          echo "=== FASE 2A (TARIFÁRIOS) INICIADA: $(date) ===" >> logs/diaria_omie.log
          python scripts/atualizar_tarifarios_eletricidade.py >> logs/diaria_omie.log 2>&1
          echo "=== FASE 2A (TARIFÁRIOS) TERMINADA: $(date) ===" >> logs/diaria_omie.log

      # O xlsx atualizado NÃO é committed — só os CSVs exportados.
      - name: Fazer commit dos CSVs do simulador
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "🔌 BOT: Atualização Tarifários Eletricidade (CSVs)"
          file_pattern: "data/simuladores/simulador-tarifarios-eletricidade/csv/*"

      # =========================================================
      # FASE 2B — Dados do site (lê o xlsx fresco da Fase 2A)
      # =========================================================
      - name: Executar Fase 2B - omie_dados_atuais
        run: |
          echo "=== FASE 2B (omie_dados_atuais) INICIADA: $(date) ===" >> logs/diaria_omie.log
          python scripts/atualizar_omie_dados_atuais.py >> logs/diaria_omie.log 2>&1

      - name: Executar Fase 2B - precos-horarios
        run: |
          echo "=== FASE 2B (precos-horarios) INICIADA: $(date) ===" >> logs/diaria_omie.log
          python scripts/atualizar_precos-horarios_csv.py >> logs/diaria_omie.log 2>&1

      - name: Executar Fase 2B - records.json (incremental)
        # Para recalcular do zero: python scripts/gerar_records_omie.py --full
        run: |
          echo "=== FASE 2B (records) INICIADA: $(date) ===" >> logs/diaria_omie.log
          python scripts/gerar_records_omie.py >> logs/diaria_omie.log 2>&1
          echo "=== FASE 2B TERMINADA: $(date) ===" >> logs/diaria_omie.log

      - name: Fazer commit dos ficheiros da Fase 2B
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "BOT: Atualização (Fase 2) Ficheiros OMIE processados"
          file_pattern: "data/omie/omie_dados_atuais.csv data/omie/precos-horarios.csv data/omie/records_omie.json"

      # O log NÃO é committed — vai só como artefacto.
      - name: Fazer upload do log como artefacto
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: log-diaria-omie
          path: logs/diaria_omie.log
          retention-days: 30

      # =========================================================
      # DEPLOY — Hugging Face (transição)
      # =========================================================
      - name: Enviar ficheiros para o Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Guard: sem o secret HF_TOKEN o clone fica anónimo e o push falha.
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::Secret HF_TOKEN não configurado em Settings → Secrets and variables → Actions deste repositório."
            exit 1
          fi

          FICHEIRO_LOCAL="data/simuladores/simulador-tarifarios-eletricidade/tarifarios_eletricidade_Tiago_Felicia.xlsx"
          # No HF mantém o nome antigo (com emoji) — é o URL que os simuladores publicados usam
          FICHEIRO_HF="Tarifarios_🔌_Eletricidade_Tiago_Felicia.xlsx"
          PASTA_CSV_LOCAL="data/simuladores/simulador-tarifarios-eletricidade/csv"
          REPO_HF="tiagofelicia/simulador-tarifarios-eletricidade"

          echo "Clonando o repositório $REPO_HF..."
          git lfs install

          # GIT_LFS_SKIP_SMUDGE=1: não descarrega os binários LFS existentes
          # (vamos substituir o xlsx de qualquer forma — poupa tempo e evita
          # falhas de smudge no checkout).
          GIT_LFS_SKIP_SMUDGE=1 git clone --depth 1 https://user:$HF_TOKEN@huggingface.co/spaces/$REPO_HF hf_repo

          cp -f "$FICHEIRO_LOCAL" "hf_repo/$FICHEIRO_HF"
          mkdir -p hf_repo/data/csv
          cp -f "$PASTA_CSV_LOCAL"/*.csv hf_repo/data/csv/
          cp -f "$PASTA_CSV_LOCAL"/manifest.json hf_repo/data/csv/

          cd hf_repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git lfs track "*.xlsx"
          git add .gitattributes
          git add "$FICHEIRO_HF"
          git add data/csv/

          git commit -m "🔌 HF: Atualização automática Excel + CSVs via GitHub Actions" || echo "Sem alterações para enviar"
          git push
