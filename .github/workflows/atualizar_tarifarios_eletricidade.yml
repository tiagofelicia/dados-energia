# Atualiza a base de dados do Simulador de Tarifários de Eletricidade.
#
# Fase 1: atualizar_mibel_ano_atual_ACUM.py
#   → data/omie/MIBEL_ano_atual_ACUM.csv (preços OMIE horários PT/ES, ~12 meses)
# Fase 2: atualizar_tarifarios_eletricidade.py
#   → escreve OMIE+futuros OMIP no xlsx do simulador (aba OMIE_PERDAS_CICLOS)
#   → exporta as abas como CSVs individuais + manifest.json
# Deploy: copia xlsx + CSVs para o espaço Hugging Face (transição — os
#   simuladores publicados ainda leem de lá; o nome do xlsx no HF mantém
#   o emoji por compatibilidade com os URLs já publicados).
#
# Migrado do repo simulador-tarifarios-eletricidade (Python/Streamlit, legado).

name: Atualizar Tarifários Eletricidade (Fase 1 e 2)

on:
  schedule:
    # === GRUPO 1: Manhã (Todos os dias) ===
    # Horário VERÃO (WEST=UTC+1) -> 11:55, 12:10 (Local)
    - cron: '55 10 * * *'
    - cron: '10 11 * * *'
    # Horário INVERNO (WET=UTC+0) -> 11:55, 12:10 (Local)
    #- cron: '55 11 * * *'
    #- cron: '10 12 * * *'

    # === GRUPO 2: Tarde (Seg-Sex) ===
    # Horário VERÃO (WEST=UTC+1) -> 19:00 (Local)
    - cron: '00 18 * * 1-5'
    # Horário INVERNO (WET=UTC+0) -> 19:00 (Local)
    #- cron: '00 19 * * 1-5'

  workflow_dispatch: # Permite execução manual

# Antecipar o default de 2026-06-16 (e silenciar o aviso de deprecação Node 20)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-python-job:
    name: Executar Atualização Tarifários Eletricidade
    runs-on: ubuntu-latest
    permissions:
      contents: write # Necessário para fazer commit das alterações

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v6

      - name: Configurar Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache das dependências Python
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # =========================================================
      # FASE 1 — MIBEL (intermédio partilhado em data/omie/)
      # =========================================================
      - name: Executar Fase 1 (atualizar_mibel_ano_atual_ACUM.py)
        run: |
          mkdir -p logs
          echo "=== FASE 1 (MIBEL CSV) INICIADA: $(date) ===" >> logs/tarifarios_eletricidade.log
          python scripts/atualizar_mibel_ano_atual_ACUM.py >> logs/tarifarios_eletricidade.log 2>&1
          echo "=== FASE 1 (MIBEL CSV) TERMINADA: $(date) ===" >> logs/tarifarios_eletricidade.log

      - name: Fazer commit do MIBEL_ano_atual_ACUM.csv
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "BOT: Atualização (Fase 1) MIBEL_ano_atual_ACUM.csv"
          file_pattern: "data/omie/MIBEL_ano_atual_ACUM.csv"

      # =========================================================
      # FASE 2 — Excel do simulador + CSVs das abas (sempre corre)
      # =========================================================
      - name: Executar Fase 2 (atualizar_tarifarios_eletricidade.py)
        run: |
          echo "=== FASE 2 (TARIFÁRIOS) INICIADA: $(date) ===" >> logs/tarifarios_eletricidade.log
          python scripts/atualizar_tarifarios_eletricidade.py >> logs/tarifarios_eletricidade.log 2>&1
          echo "=== FASE 2 (TARIFÁRIOS) TERMINADA: $(date) ===" >> logs/tarifarios_eletricidade.log

      # O xlsx atualizado NÃO é committed (binário de 4,8 MB sem delta —
      # inflaria o histórico ~10 MB/dia). No git, o xlsx é a base de
      # tarifários mantida manualmente; o bot usa-o em runtime, exporta os
      # CSVs (estes sim, committed) e envia o xlsx fresco para o HF abaixo.
      - name: Fazer commit dos CSVs do simulador
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "🔌 BOT: Atualização Tarifários Eletricidade (CSVs)"
          file_pattern: "data/simuladores/simulador-tarifarios-eletricidade/csv/*"

      # O log NÃO é committed (evita inchar o histórico) — vai só como artefacto.
      - name: Fazer upload do log como artefacto
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: log-tarifarios-eletricidade
          path: logs/tarifarios_eletricidade.log
          retention-days: 30

      # =========================================================
      # DEPLOY — Hugging Face (transição)
      # =========================================================
      - name: Enviar ficheiros para o Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Guard: sem o secret HF_TOKEN o clone fica anónimo e o push falha.
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::Secret HF_TOKEN não configurado em Settings → Secrets and variables → Actions deste repositório."
            exit 1
          fi

          FICHEIRO_LOCAL="data/simuladores/simulador-tarifarios-eletricidade/tarifarios_eletricidade_Tiago_Felicia.xlsx"
          # No HF mantém o nome antigo (com emoji) — é o URL que os simuladores publicados usam
          FICHEIRO_HF="Tarifarios_🔌_Eletricidade_Tiago_Felicia.xlsx"
          PASTA_CSV_LOCAL="data/simuladores/simulador-tarifarios-eletricidade/csv"
          REPO_HF="tiagofelicia/simulador-tarifarios-eletricidade"

          echo "Clonando o repositório $REPO_HF..."
          git lfs install

          # GIT_LFS_SKIP_SMUDGE=1: não descarrega os binários LFS existentes
          # (vamos substituir o xlsx de qualquer forma — poupa tempo e evita
          # falhas de smudge no checkout).
          GIT_LFS_SKIP_SMUDGE=1 git clone --depth 1 https://user:$HF_TOKEN@huggingface.co/spaces/$REPO_HF hf_repo

          cp -f "$FICHEIRO_LOCAL" "hf_repo/$FICHEIRO_HF"
          mkdir -p hf_repo/data/csv
          cp -f "$PASTA_CSV_LOCAL"/*.csv hf_repo/data/csv/
          cp -f "$PASTA_CSV_LOCAL"/manifest.json hf_repo/data/csv/

          cd hf_repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git lfs track "*.xlsx"
          git add .gitattributes
          git add "$FICHEIRO_HF"
          git add data/csv/

          git commit -m "🔌 HF: Atualização automática Excel + CSVs via GitHub Actions" || echo "Sem alterações para enviar"
          git push
