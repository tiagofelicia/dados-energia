# Atualiza os dados de produção elétrica de Portugal (REN Data Hub).
#
# atualizar_producao_REN.py       → data/producao/producao_dados_atuais.csv
# atualizar_producao_bombagem.py  → data/producao/producao_bombagem_diaria.csv
#                                   (incremental: últimos 7 dias)
# gerar_records_producao.py       → data/producao/records_producao.json
#                                   (incremental; --full para recalcular)
#
# Migrado do repo do site (tiagofelicia.github.io).

name: Atualizar Dados de Produção (REN)

on:
  schedule:
    # minuto 15, a cada 4 horas
    - cron: '15 */4 * * *'

  workflow_dispatch: # Permite execução manual

# Antecipar o default de 2026-06-16 (e silenciar o aviso de deprecação Node 20)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Serializa os workflows que fazem commit/push a este repo — impede que duas
# execuções simultâneas (do mesmo workflow ou de workflows diferentes) gerem
# pushes non-fast-forward. A execução em curso nunca é cancelada; em fila
# fica apenas a execução mais recente.
concurrency:
  group: commits-dados-energia
  cancel-in-progress: false

jobs:
  build-and-commit:
    name: Executar Atualização REN
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v6

      - name: Configurar Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache das dependências Python
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Atualizar produção (REN)
        run: python scripts/atualizar_producao_REN.py

      - name: Atualizar produção por bombagem (diária)
        run: python scripts/atualizar_producao_bombagem.py

      - name: Atualizar recordes de produção (incremental)
        run: python scripts/gerar_records_producao.py

      - name: Fazer commit dos dados atualizados
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "BOT: Atualização automática dos dados de produção REN"
          file_pattern: "data/producao/producao_dados_atuais.csv data/producao/producao_bombagem_diaria.csv data/producao/records_producao.json"
