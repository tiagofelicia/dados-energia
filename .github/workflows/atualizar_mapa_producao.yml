# Atualiza o mix de produção elétrica por país europeu (Energy-Charts).
#
# atualizar_mapa_producao.py → data/mapas/producao/AAAA-MM.json + metadata.json
#
# Migrado do repo do site (tiagofelicia.github.io).

name: Atualizar Mapa de Producao

on:
  schedule:
    # Todos os dias às 14:30, 18:30 e 23:00 UTC
    - cron: '30 14 * * *'
    - cron: '30 18 * * *'
    - cron: '00 23 * * *'

  workflow_dispatch: # Permite execução manual

# Antecipar o default de 2026-06-16 (e silenciar o aviso de deprecação Node 20)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Serializa os workflows que fazem commit/push a este repo — impede que duas
# execuções simultâneas (do mesmo workflow ou de workflows diferentes) gerem
# pushes non-fast-forward. A execução em curso nunca é cancelada; em fila
# fica apenas a execução mais recente.
concurrency:
  group: commits-dados-energia
  cancel-in-progress: false

jobs:
  update-production-data:
    name: Executar Atualização Energy-Charts
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v6

      - name: Configurar Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Atualizar mix de produção europeu
        run: python scripts/atualizar_mapa_producao.py

      - name: Fazer commit dos dados atualizados
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "BOT: Atualizar dados mapa de producao europeu"
          file_pattern: "data/mapas/producao/*.json"
