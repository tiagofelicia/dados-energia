# Atualiza os preços day-ahead europeus (ENTSO-E Transparency Platform).
#
# atualizar_mapa_precos_entsoe.py → data/mapas/precos_qh/AAAA-MM.json + metadata.json
#
# Requer o secret ENTSOE_TOKEN (token da API da Transparency Platform).
# Migrado do repo do site (tiagofelicia.github.io).

name: Atualizar Mapa de Precos (ENTSO-E)

on:
  schedule:
    # Todos os dias às 12:00 e às 14:00 UTC
    - cron: '0 12 * * *'
    - cron: '0 14 * * *'

  workflow_dispatch: # Permite execução manual

# Antecipar o default de 2026-06-16 (e silenciar o aviso de deprecação Node 20)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Serializa os workflows que fazem commit/push a este repo — impede que duas
# execuções simultâneas (do mesmo workflow ou de workflows diferentes) gerem
# pushes non-fast-forward. A execução em curso nunca é cancelada; em fila
# fica apenas a execução mais recente.
concurrency:
  group: commits-dados-energia
  cancel-in-progress: false

jobs:
  update-map-data:
    name: Executar Atualização ENTSO-E
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v6

      - name: Configurar Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verificar secret ENTSOE_TOKEN
        env:
          ENTSOE_TOKEN: ${{ secrets.ENTSOE_TOKEN }}
        run: |
          if [ -z "$ENTSOE_TOKEN" ]; then
            echo "::error::Secret ENTSOE_TOKEN não configurado em Settings → Secrets and variables → Actions deste repositório."
            exit 1
          fi

      - name: Atualizar preços ENTSO-E
        env:
          ENTSOE_TOKEN: ${{ secrets.ENTSOE_TOKEN }}
        run: python scripts/atualizar_mapa_precos_entsoe.py

      - name: Fazer commit dos dados atualizados
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "BOT: Atualizar dados mapa de precos (ENTSO-E)"
          file_pattern: "data/mapas/precos_qh/*.json"
